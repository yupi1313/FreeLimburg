<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeLimburg Quiz Bar — Order Queue</title>
    <meta name="description" content="Barman view for FreeLimburg quiz drink orders.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* ========== RESET & BASE ========== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #08090f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.07);
            --text-primary: #f0f0f5;
            --text-secondary: #9a9ab0;
            --text-muted: #5e5e78;
            --amber: #f0a830;
            --amber-glow: rgba(240, 168, 48, 0.2);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --red-wine: #c0392b;
            --white-wine: #f7dc6f;
            --gin: #3498db;
            --aperol: #e67e22;
            --beer: #f0a830;
            --danger: #ef4444;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== BG ========== */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 50% 40% at 10% 0%, rgba(240, 168, 48, 0.06), transparent),
                radial-gradient(ellipse 50% 50% at 90% 90%, rgba(52, 152, 219, 0.04), transparent),
                var(--bg-dark);
        }

        /* ========== HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(8, 9, 15, 0.85);
            border-bottom: 1px solid var(--border-glass);
            padding: 14px 20px;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--amber), #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .queue-badge {
            background: var(--amber-glow);
            border: 1px solid rgba(240, 168, 48, 0.3);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--amber);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }

        /* ========== LAYOUT ========== */
        .layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        /* ========== PANELS ========== */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 100px);
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .panel-count {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .panel-body {
            padding: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .panel-body::-webkit-scrollbar {
            width: 4px;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* ========== QUEUE ITEMS ========== */
        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            position: relative;
        }

        .queue-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(52, 211, 153, 0.3);
        }

        .queue-item:active {
            transform: scale(0.98);
        }

        .queue-item .drink-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .queue-item .qi-info {
            flex: 1;
            min-width: 0;
        }

        .queue-item .qi-drink {
            font-size: 0.88rem;
            font-weight: 600;
        }

        .queue-item .qi-table {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .queue-item .qi-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .queue-item .qi-serve-btn,
        .queue-item .qi-delete-btn,
        .history-item .hi-delete-btn {
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid;
        }

        .queue-item .qi-serve-btn {
            background: var(--green-dim);
            border-color: rgba(52, 211, 153, 0.25);
            color: var(--green);
        }

        .queue-item .qi-serve-btn:hover {
            background: rgba(52, 211, 153, 0.25);
            border-color: var(--green);
        }

        .queue-item .qi-delete-btn,
        .history-item .hi-delete-btn {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            font-size: 0.7rem;
            padding: 5px 8px;
        }

        .queue-item .qi-delete-btn:hover,
        .history-item .hi-delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
        }

        /* Drink color accents */
        .queue-item.beer {
            border-left: 3px solid var(--beer);
        }

        .queue-item.red-wine {
            border-left: 3px solid var(--red-wine);
        }

        .queue-item.white-wine {
            border-left: 3px solid var(--white-wine);
        }

        .queue-item.gin-tonic {
            border-left: 3px solid var(--gin);
        }

        .queue-item.aperol {
            border-left: 3px solid var(--aperol);
        }

        /* ========== SERVE ANIMATION ========== */
        @keyframes serveSlide {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(60px);
            }
        }

        .queue-item.serving {
            animation: serveSlide 0.35s ease forwards;
        }

        /* ========== HISTORY ITEMS ========== */
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .history-item:hover {
            opacity: 0.85;
        }

        .history-item .drink-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .history-item .hi-info {
            flex: 1;
            min-width: 0;
        }

        .history-item .hi-drink {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .history-item .hi-table {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .history-item .hi-time {
            font-size: 0.68rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .history-item .hi-check {
            color: var(--green);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-muted);
        }

        .empty-state .es-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 0.85rem;
        }

        /* ========== STATS BAR ========== */
        .stats-bar {
            max-width: 1100px;
            margin: 0 auto 0;
            padding: 0 16px;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-chip .sv {
            font-weight: 700;
            color: var(--amber);
        }

        /* ========== CLEAR ALL ========== */
        .clear-section {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 16px;
            text-align: right;
        }

        .clear-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-sm);
            padding: 8px 18px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--danger);
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
        }

        /* ========== AUDIO DING ========== */
        /* We'll use Web Audio API for new-order notification */

        /* ========== TABLE FILTER ========== */
        .filter-bar {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 5px 13px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: var(--bg-card-hover);
            border-color: rgba(240, 168, 48, 0.3);
        }

        .filter-btn.active {
            background: var(--amber-glow);
            border-color: var(--amber);
            color: var(--amber);
            font-weight: 700;
        }

        /* ========== DELETE ANIMATION ========== */
        @keyframes deleteSlide {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-60px);
            }
        }

        .queue-item.deleting,
        .history-item.deleting {
            animation: deleteSlide 0.3s ease forwards;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .stats-row {
                justify-content: center;
            }

            .filter-bar {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <header class="header">
        <div class="header-inner">
            <div>
                <h1>🍺 FreeLimburg Bar</h1>
                <div class="subtitle">Tap an order to mark it served</div>
            </div>
            <div class="header-right">
                <div class="queue-badge" id="queueBadge">0 in queue</div>
                <div class="connection-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting…</span>
                </div>
            </div>
        </div>
    </header>

    <div class="stats-bar" style="margin-top:14px; margin-bottom:14px;">
        <div class="stats-row" id="statsRow"></div>
    </div>

    <div class="filter-bar" id="filterBar">
        <span class="filter-label">Filter table:</span>
        <button class="filter-btn active" data-table="all">All Tables</button>
    </div>

    <div class="layout">
        <!-- QUEUE PANEL -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">⏳ Order Queue</span>
                <span class="panel-count" id="queueCount">0 orders</span>
            </div>
            <div class="panel-body" id="queueBody">
                <div class="empty-state" id="queueEmpty">
                    <div class="es-icon">🎉</div>
                    <p>No pending orders — all caught up!</p>
                </div>
            </div>
        </div>

        <!-- HISTORY PANEL -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">✅ Served History</span>
                <span class="panel-count" id="historyCount">0 served</span>
            </div>
            <div class="panel-body" id="historyBody">
                <div class="empty-state" id="historyEmpty">
                    <div class="es-icon">📋</div>
                    <p>No drinks served yet</p>
                </div>
            </div>
        </div>
    </div>

    <div class="clear-section">
        <button class="clear-btn" id="clearAllBtn">🗑 Clear All Orders</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <script>
        // =====================================================
        // 🔧  FIREBASE CONFIG — must match the qdrinks page
        // =====================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDuiJsy00_w3FudEv2U8HniO04JuyUVzxo",
            authDomain: "freelimburg-quiz.firebaseapp.com",
            databaseURL: "https://freelimburg-quiz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "freelimburg-quiz",
            storageBucket: "freelimburg-quiz.firebasestorage.app",
            messagingSenderId: "199443003943",
            appId: "1:199443003943:web:d2e3c5bc01fb8186486c02"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // =====================================================
        // DATA
        // =====================================================
        const DRINK_META = {
            beer: { name: "Beer", emoji: "🍺", css: "beer", price: 2 },
            red_wine: { name: "Red Wine", emoji: "🍷", css: "red-wine", price: 3 },
            white_wine: { name: "White Wine", emoji: "🥂", css: "white-wine", price: 3 },
            gin_tonic: { name: "Gin & Tonic", emoji: "🍸", css: "gin-tonic", price: 6 },
            aperol: { name: "Aperol Spritz", emoji: "🧡", css: "aperol", price: 7 }
        };

        const TABLES = [
            { id: 1, name: "De Sjansen" },
            { id: 2, name: "Bier Baronen" },
            { id: 3, name: "Kwis Mansen" },
            { id: 4, name: "Hemelbestormers" },
            { id: 5, name: "Limburgse Leeuwen" },
            { id: 6, name: "De Proosters" },
            { id: 7, name: "Sjpas Mansen" },
            { id: 8, name: "Hansen Op De Bok" },
            { id: 9, name: "Stampij Makers" },
            { id: 10, name: "Kansen Pakkers" },
            { id: 11, name: "Dorps Gekkies" },
            { id: 12, name: "Boerenflansen" },
            { id: 13, name: "De Kansen" }
        ];

        let activeFilter = 'all';

        // =====================================================
        // BUILD TABLE FILTER BUTTONS
        // =====================================================
        (function buildFilterButtons() {
            const bar = document.getElementById('filterBar');
            TABLES.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.table = t.id;
                btn.textContent = `#${t.id}`;
                btn.title = t.name;
                btn.addEventListener('click', () => setFilter(String(t.id)));
                bar.appendChild(btn);
            });
            document.querySelector('.filter-btn[data-table="all"]').addEventListener('click', () => setFilter('all'));
        })();

        function setFilter(tableId) {
            activeFilter = tableId;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.table === tableId);
            });
            // Re-render with current data
            if (cachedAllOrders) {
                processOrders(cachedAllOrders);
            }
        }

        // =====================================================
        // AUDIO NOTIFICATION (simple beep via Web Audio)
        // =====================================================
        let audioCtx = null;
        let lastOrderCount = 0;

        function playDing() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.15;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) { }
        }

        // =====================================================
        // LISTEN TO ALL ORDERS
        // =====================================================
        const ordersRef = db.ref('orders').orderByChild('timestamp');
        let cachedAllOrders = null;

        ordersRef.on('value', snapshot => {
            const allOrders = [];
            snapshot.forEach(child => {
                allOrders.push({ id: child.key, ...child.val() });
            });
            cachedAllOrders = allOrders;
            processOrders(allOrders);
        });

        function processOrders(allOrders) {
            // Apply table filter
            const filtered = activeFilter === 'all'
                ? allOrders
                : allOrders.filter(o => String(o.tableId) === activeFilter);

            const pending = filtered.filter(o => o.status === 'pending').sort((a, b) => a.timestamp - b.timestamp);
            const served = filtered.filter(o => o.status === 'served').sort((a, b) => (b.servedAt || b.timestamp) - (a.servedAt || a.timestamp));

            // Ding on new order (use unfiltered pending count)
            const allPending = allOrders.filter(o => o.status === 'pending');
            if (allPending.length > lastOrderCount && lastOrderCount > 0) {
                playDing();
            }
            lastOrderCount = allPending.length;

            renderQueue(pending);
            renderHistory(served);
            renderStats(filtered);
            updateBadge(allPending.length);
        }

        // =====================================================
        // RENDER QUEUE
        // =====================================================
        function renderQueue(pending) {
            const body = document.getElementById('queueBody');
            const countEl = document.getElementById('queueCount');
            countEl.textContent = `${pending.length} order${pending.length !== 1 ? 's' : ''}`;

            if (pending.length === 0) {
                body.innerHTML = `<div class="empty-state"><div class="es-icon">🎉</div><p>No pending orders — all caught up!</p></div>`;
                return;
            }

            body.innerHTML = '';
            pending.forEach(order => {
                const meta = DRINK_META[order.drink] || { name: order.drink, emoji: '🍹', css: '' };
                const timeAgo = formatTimeAgo(order.timestamp);

                const el = document.createElement('div');
                el.className = `queue-item ${meta.css}`;
                el.innerHTML = `
                    <span class="drink-icon">${meta.emoji}</span>
                    <div class="qi-info">
                        <div class="qi-drink">${meta.name}</div>
                        <div class="qi-table">Table #${order.tableId} — ${order.teamName}</div>
                    </div>
                    <span class="qi-time">${timeAgo}</span>
                    <button class="qi-serve-btn">✓ Serve</button>
                    <button class="qi-delete-btn">🗑</button>
                `;

                const btn = el.querySelector('.qi-serve-btn');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    serveOrder(order.id, el);
                });
                el.querySelector('.qi-delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteOrder(order.id, el);
                });
                el.addEventListener('click', () => {
                    serveOrder(order.id, el);
                });

                body.appendChild(el);
            });
        }

        // =====================================================
        // SERVE AN ORDER
        // =====================================================
        function serveOrder(orderId, element) {
            if (element) {
                element.classList.add('serving');
            }
            setTimeout(() => {
                db.ref(`orders/${orderId}`).update({
                    status: 'served',
                    servedAt: firebase.database.ServerValue.TIMESTAMP
                });
            }, 300);
        }

        // =====================================================
        // DELETE AN ORDER (mistake correction)
        // =====================================================
        function deleteOrder(orderId, element) {
            if (element) {
                element.classList.add('deleting');
            }
            setTimeout(() => {
                db.ref(`orders/${orderId}`).remove();
            }, 280);
        }

        // =====================================================
        // RENDER HISTORY
        // =====================================================
        function renderHistory(served) {
            const body = document.getElementById('historyBody');
            const countEl = document.getElementById('historyCount');
            countEl.textContent = `${served.length} served`;

            if (served.length === 0) {
                body.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><p>No drinks served yet</p></div>`;
                return;
            }

            body.innerHTML = '';
            served.forEach(order => {
                const meta = DRINK_META[order.drink] || { name: order.drink, emoji: '🍹', css: '' };
                const time = order.servedAt ? formatTime(order.servedAt) : '';

                const el = document.createElement('div');
                el.className = 'history-item';
                el.innerHTML = `
                    <span class="drink-icon">${meta.emoji}</span>
                    <div class="hi-info">
                        <div class="hi-drink">${meta.name}</div>
                        <div class="hi-table">Table #${order.tableId} — ${order.teamName}</div>
                    </div>
                    <span class="hi-time">${time}</span>
                    <span class="hi-check">✓</span>
                    <button class="hi-delete-btn">🗑</button>
                `;
                el.querySelector('.hi-delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteOrder(order.id, el);
                });
                body.appendChild(el);
            });
        }

        // =====================================================
        // RENDER STATS
        // =====================================================
        function renderStats(allOrders) {
            const el = document.getElementById('statsRow');

            // Total revenue
            const totalRevenue = allOrders.reduce((s, o) => s + (o.price || 0), 0);

            // Per-drink counts
            const counts = {};
            allOrders.forEach(o => {
                counts[o.drink] = (counts[o.drink] || 0) + 1;
            });

            let html = `<div class="stat-chip">💰 Total: <span class="sv">€${totalRevenue}</span></div>`;
            html += `<div class="stat-chip">📦 Total orders: <span class="sv">${allOrders.length}</span></div>`;

            Object.keys(DRINK_META).forEach(key => {
                if (counts[key]) {
                    const m = DRINK_META[key];
                    html += `<div class="stat-chip">${m.emoji} ${m.name}: <span class="sv">${counts[key]}</span></div>`;
                }
            });

            el.innerHTML = html;
        }

        // =====================================================
        // UPDATE BADGE
        // =====================================================
        function updateBadge(count) {
            const badge = document.getElementById('queueBadge');
            badge.textContent = `${count} in queue`;
            document.title = count > 0 ? `(${count}) FreeLimburg Bar` : 'FreeLimburg Bar';
        }

        // =====================================================
        // TIME HELPERS
        // =====================================================
        function formatTimeAgo(ts) {
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 10) return 'just now';
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            return `${Math.floor(diff / 3600)}h ago`;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // =====================================================
        // CLEAR ALL ORDERS
        // =====================================================
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (confirm('⚠️ This will delete ALL orders (pending + history). Are you sure?')) {
                db.ref('orders').remove();
            }
        });

        // =====================================================
        // CONNECTION STATUS
        // =====================================================
        db.ref('.info/connected').on('value', snap => {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if (snap.val() === true) {
                dot.classList.add('connected');
                txt.textContent = 'Live';
            } else {
                dot.classList.remove('connected');
                txt.textContent = 'Offline';
            }
        });

        // Refresh time-ago labels every 15s
        setInterval(() => {
            const items = document.querySelectorAll('.qi-time');
            // Will be refreshed on next Firebase update anyway
        }, 15000);
    </script>
</body>

</html>
